sentence=High-performance embedded C++ libraries for ESP32, STM32 and other MCUs: UI stack for the Waveshare 7-inch RGB display.
paragraph=Embedded C++17 UI stack for ESP32-S3: graphics via LovyanGFX, GT911 capacitive touch, CH422G IO expander for backlight and reset, UI widgets (buttons, panels, LEDs, temperature display), modal keypad and keyboard, WiFi network selector. Layout tuned for 800x480. Supported targets: ESP32-S3 only — the LovyanGFX/CH422G pipeline is hardware-specific; not portable to STM32.
category=Display
url=https://github.com/alexconesap/ungula-display.git
includes=ungula/display.h
depends=UngulaCore
architectures=esp32
